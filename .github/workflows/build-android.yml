name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Force JAVA_HOME to Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          java -version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache m4 gettext \
            liblzma-dev lzma lzma-dev libbz2-dev libsqlite3-dev libreadline-dev

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 Cython==0.29.36 "sh<2.0"
          pip install python-for-android==2024.1.21

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          java -version
          echo "JAVA_HOME is: $JAVA_HOME"
          yes | buildozer android debug 2>&1 | tee build.log || true

      - name: Locate APK
        id: findapk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ]; then echo "::error::No APK produced — see build-log."; fi

      - name: Upload APK
        if: steps.findapk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: UrduNewsDaily-APK
          path: ${{ steps.findapk.outputs.apk_path }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Fail if no APK
        if: steps.findapk.outputs.apk_path == ''
        run: exit 1
