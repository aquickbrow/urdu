name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache m4 gettext

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          # Pin the whole toolchain to known-good versions:
          #  - buildozer 1.5.0
          #  - python-for-android 2024.1.21 (uses Python 3.11, NOT 3.14)
          #  - sh<2.0 (sh 2.x breaks p4a's subprocess calls)
          # Installing p4a via pip makes buildozer use THIS one instead of
          # cloning master (which forces 3.14 and breaks pyjnius).
          pip install buildozer==1.5.0 Cython==0.29.36 "sh<2.0"
          pip install python-for-android==2024.1.21

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build.log || true

      - name: Locate APK
        id: findapk
        run: |
          APK=$(find . -name "*.apk" -path "*bin*" | head -1)
          if [ -z "$APK" ]; then APK=$(find . -name "*.apk" | head -1); fi
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ]; then
            echo "::error::No APK was produced — see build-log artifact."
          fi

      - name: Upload APK artifact
        if: steps.findapk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: UrduNewsDaily-APK
          path: ${{ steps.findapk.outputs.apk_path }}

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Fail if no APK
        if: steps.findapk.outputs.apk_path == ''
        run: exit 1
